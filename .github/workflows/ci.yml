name: CI
on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: sbt
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - name: Build and Test Scala JS
        run: sbt +ringSeqJS/test
      - name: Build and Test Scala JVM
        run: sbt +ringSeqJVM/test
      - name: Install LLVM toolchain (Scala Native)
        run: sudo apt-get update && sudo apt-get install -y clang libstdc++-12-dev
      - name: Build and Test Scala Native
        run: sbt +ringSeqNative/test
      - name: Scalafix
        run: sbt -v +"scalafixAll --check"
